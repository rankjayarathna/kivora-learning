<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎨 Color &amp; Create! · Kivora Learning</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Baloo+2:wght@700;800&family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --sky:#4A90E2;--sky-dk:#2E6FC4;--sky-lt:#E8F4F8;
      --yellow:#FFD700;--orange:#FF8C42;--green:#52C41A;--green-dk:#3A9A0E;
      --pink:#FF69B4;--charcoal:#2C3E50;--gray:#95A5A6;--white:#FFFFFF;
      --r8:8px;--r16:16px;--r24:24px;--r50:50px;
      --shadow:0 4px 24px rgba(0,0,0,0.10);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Nunito',sans-serif;background:#EFF8FF;color:var(--charcoal);min-height:100vh}
    a{text-decoration:none;color:inherit}

    /* ── NAV ── */
    .navbar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,0,0,.06);height:64px;display:flex;align-items:center;padding:0 24px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
    .nav-inner{max-width:1100px;margin:0 auto;width:100%;display:flex;align-items:center;justify-content:space-between}
    .nav-logo{font-family:'Baloo 2',cursive;font-size:1.35rem;font-weight:800;color:var(--charcoal);display:flex;align-items:center;gap:8px}
    .logo-icon{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--sky),var(--pink));display:flex;align-items:center;justify-content:center;font-size:17px}
    .nav-logo span{color:var(--sky)}
    .nav-back{display:inline-flex;align-items:center;gap:6px;font-size:.875rem;font-weight:700;color:var(--gray);padding:8px 14px;border-radius:var(--r8);transition:all .2s}
    .nav-back:hover{color:var(--sky);background:var(--sky-lt)}

    /* ── PAGE ── */
    .page{max-width:1100px;margin:0 auto;padding:28px 20px 52px}

    /* ── HEADER ── */
    .hdr{text-align:center;margin-bottom:26px}
    .hdr h1{font-family:'Baloo 2',cursive;font-size:2.1rem;font-weight:800;margin-bottom:6px}
    .hdr h1 span{color:var(--sky)}
    .hdr p{color:var(--gray);font-size:.95rem;font-weight:600}

    /* ── SCENE TABS ── */
    .tabs{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:22px}
    .tab{padding:10px 20px;border-radius:var(--r50);border:2.5px solid #DDE5ED;background:var(--white);font-family:'Fredoka',sans-serif;font-size:.98rem;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap}
    .tab:hover:not(.active){border-color:var(--sky);color:var(--sky)}
    .tab.active{background:var(--sky);color:var(--white);border-color:var(--sky);box-shadow:0 4px 14px rgba(74,144,226,.35)}

    /* ── STUDIO LAYOUT ── */
    .studio{display:flex;gap:16px;align-items:flex-start}

    /* ── PALETTE PANEL ── */
    .palette{background:var(--white);border-radius:var(--r24);padding:18px 14px;box-shadow:var(--shadow);flex-shrink:0;width:188px}
    .panel-lbl{font-family:'Fredoka',sans-serif;font-weight:600;font-size:.82rem;color:var(--gray);margin-bottom:10px;text-align:center;letter-spacing:.5px;text-transform:uppercase}
    .swatches{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:12px}
    .sw{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;box-shadow:0 2px 6px rgba(0,0,0,.12);transition:transform .15s,border-color .15s,box-shadow .15s}
    .sw:hover{transform:scale(1.18);box-shadow:0 4px 12px rgba(0,0,0,.25)}
    .sw.on{border-color:var(--charcoal)!important;transform:scale(1.22);box-shadow:0 4px 14px rgba(0,0,0,.3)}
    .sel-preview{display:flex;align-items:center;gap:9px;padding:9px 11px;background:#f5f7fa;border-radius:var(--r8);margin-bottom:14px}
    .sel-dot{width:26px;height:26px;border-radius:50%;border:2px solid #ddd;flex-shrink:0;transition:background .2s}
    .sel-name{font-size:.8rem;font-weight:800;color:var(--charcoal)}
    .divider{border:none;border-top:1px solid #eee;margin:0 0 12px}
    .tool-row{display:flex;gap:8px}
    .tool-btn{flex:1;padding:9px 5px;border-radius:var(--r8);border:2.5px solid #DDE5ED;background:var(--white);cursor:pointer;font-family:'Nunito',sans-serif;font-size:.78rem;font-weight:800;color:var(--charcoal);display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .2s}
    .tool-btn:hover:not(.on){border-color:var(--sky);color:var(--sky)}
    .tool-btn.on{border-color:var(--sky);background:var(--sky-lt);color:var(--sky)}
    .tool-icon{font-size:1.25rem}

    /* ── SVG CANVAS ── */
    .canvas-wrap{background:var(--white);border-radius:var(--r24);box-shadow:var(--shadow);overflow:hidden;flex:1;cursor:crosshair;min-height:420px}
    .canvas-wrap svg{display:block;width:100%;height:auto}
    .scene-panel{display:none}
    .scene-panel.active{display:block}
    .c{cursor:pointer;transition:filter .12s}
    .c:hover{filter:brightness(.9)}

    /* ── ACTIONS ── */
    .actions{display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap}
    .act-btn{padding:12px 22px;border-radius:var(--r50);border:none;font-family:'Fredoka',sans-serif;font-size:.95rem;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:all .2s;letter-spacing:.3px}
    .act-btn.undo{background:#F0F4F8;color:var(--charcoal)}
    .act-btn.undo:hover{background:#E2E8EF}
    .act-btn.clear{background:#FDE8E8;color:#E74C3C}
    .act-btn.clear:hover{background:#FBCECE}
    .act-btn.print{background:var(--green);color:var(--white);box-shadow:0 4px 12px rgba(82,196,26,.3)}
    .act-btn.print:hover{background:var(--green-dk);transform:translateY(-2px)}
    .act-btn.save{background:var(--sky);color:var(--white);box-shadow:0 4px 12px rgba(74,144,226,.3)}
    .act-btn.save:hover{background:var(--sky-dk);transform:translateY(-2px)}

    /* ── RESPONSIVE ── */
    @media(max-width:820px){
      .studio{flex-direction:column}
      .palette{width:100%;display:grid;grid-template-columns:auto 1fr;gap:12px 16px;align-items:start}
      .swatches{grid-template-columns:repeat(10,1fr)}
      .sw{width:30px;height:30px}
      .divider,.panel-lbl:first-child{display:none}
    }
    @media(max-width:520px){
      .swatches{grid-template-columns:repeat(7,1fr)}
      .hdr h1{font-size:1.55rem}
      .tab{padding:8px 14px;font-size:.88rem}
    }
  </style>
  <style>
    /* ── mandala additions ── */
    .thumb-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:7px;max-height:460px;overflow-y:auto;padding:4px;scrollbar-width:thin}
    .thumb-grid::-webkit-scrollbar{width:4px}
    .thumb-grid::-webkit-scrollbar-thumb{background:var(--pink);border-radius:4px}
    .m-thumb{width:56px;height:56px;border-radius:12px;border:2.5px solid #DDE5ED;background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;padding:2px}
    .m-thumb:hover{border-color:var(--pink);transform:scale(1.1);box-shadow:0 3px 12px rgba(255,105,180,.3)}
    .m-thumb.sel{border-color:var(--pink);background:#FFF0F9;box-shadow:0 4px 14px rgba(255,105,180,.4)}
    .m-thumb svg{display:block;width:100%;height:auto}
    #mandala-browser{display:none;background:white;border-radius:24px;padding:20px;box-shadow:0 4px 28px rgba(0,0,0,.1);flex:1}
    .m-browser-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
    .m-browser-header h3{font-family:'Baloo 2',cursive;font-size:1.1rem;font-weight:800;color:var(--charcoal)}
    .m-back-btn{padding:7px 14px;border-radius:50px;border:2px solid #DDE5ED;background:white;font-family:'Fredoka',sans-serif;font-size:.88rem;cursor:pointer;transition:all .2s;display:none}
    .m-back-btn:hover{border-color:var(--pink);color:var(--pink)}
    .m-count{font-family:'Fredoka',sans-serif;font-size:.82rem;color:var(--gray)}
    @media(max-width:820px){.thumb-grid{grid-template-columns:repeat(6,1fr)}}
    @media(max-width:520px){.thumb-grid{grid-template-columns:repeat(5,1fr)}}
  </style>
</head>

  <div class="nav-inner">
    <a class="nav-logo" href="index.html"><span class="logo-icon">🎓</span>Kivora<span>Learning</span></a>

</nav>

      <!-- Mandala scene (filled by JS) -->
      <div class="scene-panel" id="sp-mandala">

    <!-- MANDALA BROWSER (shown when Patterns tab active, no mandala chosen yet) -->

  </div><!-- /studio -->

  <div class="actions">
    <button class="act-btn undo"  onclick="undoLast()">↩ Undo</button>
    <button class="act-btn clear" onclick="clearAll()">🗑 Clear</button>
    <button class="act-btn print" onclick="doPrint()">🖨 Print</button>
    <button class="act-btn save"  onclick="doSave()">⬇ Save PNG</button>
  </div>

<script>
  let color = '#FF4444', tool = 'fill', hist = [];

  function pickColor(sw){
    document.querySelectorAll('.sw').forEach(s=>s.classList.remove('on'));
    sw.classList.add('on');
    color = sw.dataset.c;
    document.getElementById('selDot').style.background  = color;
    document.getElementById('selName').textContent       = sw.dataset.n;
    setTool('fill');
  }

  function setTool(t){
    tool = t;
    document.getElementById('toolFill').classList.toggle('on',  t==='fill');
    document.getElementById('toolErase').classList.toggle('on', t==='erase');
    document.getElementById('canvasWrap').style.cursor = t==='erase' ? 'cell' : 'crosshair';
  }

  document.querySelectorAll('.c').forEach(el=>{
    el.addEventListener('click', function(e){
      e.stopPropagation();
      const prev = this.getAttribute('fill') || 'white';
      const next = tool==='erase' ? 'white' : color;
      if(prev!==next){ hist.push({el:this,fill:prev}); if(hist.length>100) hist.shift(); }
      this.setAttribute('fill', next);
    });
  });

  function switchScene(btn, scene){
    document.getElementById('mandala-browser').style.display='none';
    document.getElementById('canvasWrap').style.display='';
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.scene-panel').forEach(p=>p.classList.remove('active'));
    document.getElementById('sp-'+scene).classList.add('active'); attachHandlers();
  }

  function undoLast(){
    if(!hist.length) return;
    const {el,fill} = hist.pop();
    el.setAttribute('fill', fill);
  }

  function clearAll(){
    const panel = document.querySelector('.scene-panel.active');
    if(!panel) return;
    panel.querySelectorAll('.c').forEach(el=>el.setAttribute('fill','white'));
    hist=[];
  }

  function doPrint(){
    const svg = document.querySelector('.scene-panel.active svg');
    if(!svg) return;
    const w = window.open('','_blank','width=640,height=720');
    w.document.write(`<!DOCTYPE html><html><head><style>
      @page{margin:10mm}body{margin:0;display:flex;justify-content:center;align-items:center;height:100vh}
      svg{width:90vmin;height:90vmin}</style></head><body>
      ${new XMLSerializer().serializeToString(svg)}
      <script>window.onload=()=>{window.print();setTimeout(()=>window.close(),600)}<\/script>
    </body></html>`);
    w.document.close();
  }

  function doSave(){
    const svg = document.querySelector('.scene-panel.active svg');
    if(!svg) return;
    const sz  = 800;
    const cvs = document.createElement('canvas');
    cvs.width = cvs.height = sz;
    const ctx = cvs.getContext('2d');
    ctx.fillStyle='white'; ctx.fillRect(0,0,sz,sz);
    const svgStr = new XMLSerializer().serializeToString(svg);
    const blob   = new Blob([svgStr],{type:'image/svg+xml'});
    const url    = URL.createObjectURL(blob);
    const img    = new Image();
    img.onload = ()=>{
      ctx.drawImage(img,0,0,sz,sz); URL.revokeObjectURL(url);
      const a=document.createElement('a');
      a.href=cvs.toDataURL('image/png'); a.download='kivora-coloring.png'; a.click();
    };
    img.onerror = ()=>{
      URL.revokeObjectURL(url);
      const a=document.createElement('a');
      a.href='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svgStr);
      a.download='kivora-coloring.svg'; a.click();
    };
    img.src = url;
  }
</script>

<script>
/* ═══════════════════════════════════════
   MANDALA GENERATOR — 90 patterns
═══════════════════════════════════════ */
// [petals, rings, style]  style: 0=wedge 1=petal 2=circle
const MCFGS=[
  [4,2,0],[4,3,0],[4,4,0],[4,5,0],[4,6,0],
  [5,2,0],[5,3,0],[5,4,0],[5,5,0],[5,6,0],
  [6,2,0],[6,3,0],[6,4,0],[6,5,0],[6,6,0],
  [8,2,0],[8,3,0],[8,4,0],[8,5,0],[8,6,0],
  [10,2,0],[10,3,0],[10,4,0],[10,5,0],[10,6,0],
  [12,2,0],[12,3,0],[12,4,0],[12,5,0],[12,6,0],
  [4,2,1],[4,3,1],[4,4,1],[4,5,1],[4,6,1],
  [5,2,1],[5,3,1],[5,4,1],[5,5,1],[5,6,1],
  [6,2,1],[6,3,1],[6,4,1],[6,5,1],[6,6,1],
  [8,2,1],[8,3,1],[8,4,1],[8,5,1],[8,6,1],
  [10,2,1],[10,3,1],[10,4,1],[10,5,1],[10,6,1],
  [12,2,1],[12,3,1],[12,4,1],[12,5,1],[12,6,1],
  [4,2,2],[4,3,2],[4,4,2],[4,5,2],[4,6,2],
  [5,2,2],[5,3,2],[5,4,2],[5,5,2],[5,6,2],
  [6,2,2],[6,3,2],[6,4,2],[6,5,2],[6,6,2],
  [8,2,2],[8,3,2],[8,4,2],[8,5,2],[8,6,2],
  [10,2,2],[10,3,2],[10,4,2],[10,5,2],[10,6,2],
  [12,2,2],[12,3,2],[12,4,2],[12,5,2],[12,6,2]
];

function R(n){return Math.round(n*10)/10;}

function genMandala(cfg,cx,cy,maxR,forThumb){
  const[petals,rings,style]=cfg;
  cx=cx||200; cy=cy||200; maxR=maxR||175;
  const rs=maxR/rings, sw=forThumb?'0.9':'1.5', parts=[];
  parts.push(`<circle class="${forThumb?'':'c'}" cx="${cx}" cy="${cy}" r="${maxR}" fill="white" stroke="#333" stroke-width="${forThumb?'0.8':'2'}"/>`);
  for(let ri=0;ri<rings;ri++){
    const r1=rs*ri, r2=rs*(ri+1);
    for(let p=0;p<petals;p++){
      const a1=2*Math.PI*p/petals, a2=2*Math.PI*(p+1)/petals, am=(a1+a2)/2;
      if(style===0){
        const x1=R(cx+r1*Math.cos(a1)),y1=R(cy+r1*Math.sin(a1));
        const x2=R(cx+r2*Math.cos(a1)),y2=R(cy+r2*Math.sin(a1));
        const x3=R(cx+r2*Math.cos(a2)),y3=R(cy+r2*Math.sin(a2));
        const x4=R(cx+r1*Math.cos(a2)),y4=R(cy+r1*Math.sin(a2));
        const laf=(a2-a1>Math.PI)?1:0;
        const d=ri===0?`M${cx},${cy} L${x2},${y2} A${R(r2)},${R(r2)} 0 ${laf} 1 ${x3},${y3} Z`
          :`M${x1},${y1} L${x2},${y2} A${R(r2)},${R(r2)} 0 ${laf} 1 ${x3},${y3} L${x4},${y4} A${R(r1)},${R(r1)} 0 ${laf} 0 ${x1},${y1} Z`;
        parts.push(`<path class="${forThumb?'':'c'}" d="${d}" fill="white" stroke="#333" stroke-width="${sw}"/>`);
      }else if(style===1){
        const sx=ri===0?cx:R(cx+r1*Math.cos(a1)), sy=ri===0?cy:R(cy+r1*Math.sin(a1));
        const ex=ri===0?cx:R(cx+r1*Math.cos(a2)), ey=ri===0?cy:R(cy+r1*Math.sin(a2));
        const px=R(cx+r2*Math.cos(am)), py=R(cy+r2*Math.sin(am));
        const hx1=R(cx+r2*0.85*Math.cos(a1)), hy1=R(cy+r2*0.85*Math.sin(a1));
        const hx2=R(cx+r2*0.85*Math.cos(a2)), hy2=R(cy+r2*0.85*Math.sin(a2));
        parts.push(`<path class="${forThumb?'':'c'}" d="M${sx},${sy} Q${hx1},${hy1} ${px},${py} Q${hx2},${hy2} ${ex},${ey} Z" fill="white" stroke="#333" stroke-width="${sw}"/>`);
      }else{
        const rm=r1+rs/2;
        const mx=R(cx+rm*Math.cos(am)), my=R(cy+rm*Math.sin(am));
        parts.push(`<circle class="${forThumb?'':'c'}" cx="${mx}" cy="${my}" r="${R(rs*0.43)}" fill="white" stroke="#333" stroke-width="${sw}"/>`);
      }
    }
  }
  parts.push(`<circle class="${forThumb?'':'c'}" cx="${cx}" cy="${cy}" r="${R(rs*0.5)}" fill="white" stroke="#333" stroke-width="${forThumb?'1':'2'}"/>`);
  return parts.join('');
}

function buildThumb(cfg,idx){
  const sz=52,c=sz/2,r=c-3;
  return`<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}" xmlns="http://www.w3.org/2000/svg">${genMandala(cfg,c,c,r,true)}</svg>`;
}

function renderThumbs(){
  const grid=document.getElementById('thumbGrid');
  if(!grid||grid.children.length>0) return;
  MCFGS.forEach((cfg,i)=>{
    const d=document.createElement('div');
    d.className='m-thumb'; d.dataset.idx=i;
    d.title=`Pattern ${i+1}: ${cfg[0]} petals, ${cfg[1]} rings`;
    d.innerHTML=buildThumb(cfg,i);
    d.addEventListener('click',()=>loadMandala(i));
    grid.appendChild(d);
  });
}

function openMandalas(btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.scene-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('canvasWrap').style.display='none';
  document.getElementById('mandala-browser').style.display='block';
  document.getElementById('mBackBtn').style.display='none';
  renderThumbs();
}

function loadMandala(idx){
  document.querySelectorAll('.m-thumb').forEach(t=>t.classList.remove('sel'));
  const th=document.querySelector(`.m-thumb[data-idx="${idx}"]`);
  if(th) th.classList.add('sel');
  const svg=document.getElementById('svg-mandala');
  svg.innerHTML=genMandala(MCFGS[idx]);
  // Attach color handlers to new .c elements
  svg.querySelectorAll('.c').forEach(el=>{
    el.addEventListener('click',function(e){
      e.stopPropagation();
      const prev=this.getAttribute('fill')||'white';
      const next=tool==='erase'?'white':color;
      if(prev!==next){hist.push({el:this,fill:prev});if(hist.length>100)hist.shift();}
      this.setAttribute('fill',next);
    });
  });
  // Switch to canvas
  document.getElementById('mandala-browser').style.display='none';
  document.getElementById('canvasWrap').style.display='';
  document.querySelectorAll('.scene-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('sp-mandala').classList.add('active');
  document.getElementById('mBackBtn').style.display='inline-flex';
  document.getElementById('mandala-browser').style.display='none';
}

function showMandalaGrid(){
  document.getElementById('canvasWrap').style.display='none';
  document.getElementById('mandala-browser').style.display='block';
  document.getElementById('mBackBtn').style.display='none';
}

// Also attach handlers after switchScene
function attachHandlers(){
  document.querySelectorAll('.scene-panel.active .c').forEach(el=>{
    if(!el._colorBound){
      el._colorBound=true;
      el.addEventListener('click',function(e){
        e.stopPropagation();
        const prev=this.getAttribute('fill')||'white';
        const next=tool==='erase'?'white':color;
        if(prev!==next){hist.push({el:this,fill:prev});if(hist.length>100)hist.shift();}
        this.setAttribute('fill',next);
      });
    }
  });
}
</script>
