<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🧠 Memory Game · Kivora Learning</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Baloo+2:wght@700;800&family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--sky:#4A90E2;--sky-dk:#2E6FC4;--sky-lt:#E8F4F8;--yellow:#FFD700;--orange:#FF8C42;--green:#52C41A;--green-dk:#3A9A0E;--pink:#FF69B4;--charcoal:#2C3E50;--gray:#95A5A6;--white:#FFFFFF;--purple:#9B59B6}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Nunito',sans-serif;background:linear-gradient(160deg,#FFF0F5 0%,#EFF8FF 50%,#F0FFF0 100%);min-height:100vh;color:var(--charcoal)}
    a{text-decoration:none;color:inherit}
    .navbar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,0,0,.06);height:64px;display:flex;align-items:center;padding:0 24px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
    .nav-inner{max-width:900px;margin:0 auto;width:100%;display:flex;align-items:center;justify-content:space-between}
    .nav-logo{font-family:'Baloo 2',cursive;font-size:1.35rem;font-weight:800;color:var(--charcoal);display:flex;align-items:center;gap:8px}
    .logo-icon{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--sky),var(--pink));display:flex;align-items:center;justify-content:center;font-size:17px}
    .nav-logo span{color:var(--sky)}
    .nav-back{display:inline-flex;align-items:center;gap:6px;font-size:.875rem;font-weight:700;color:var(--gray);padding:8px 14px;border-radius:8px;transition:all .2s}
    .nav-back:hover{color:var(--sky);background:var(--sky-lt)}
    .page{max-width:860px;margin:0 auto;padding:28px 18px 60px}
    .hdr{text-align:center;margin-bottom:20px}
    .hdr h1{font-family:'Baloo 2',cursive;font-size:2rem;font-weight:800;margin-bottom:5px}
    .hdr h1 span{color:var(--pink)}
    .hdr p{color:var(--gray);font-size:.93rem;font-weight:600}
    .section-lbl{font-family:'Fredoka',sans-serif;font-weight:600;font-size:.82rem;color:var(--gray);text-align:center;letter-spacing:.6px;text-transform:uppercase;margin-bottom:8px}
    .deck-row{display:flex;gap:7px;overflow-x:auto;padding:3px 2px 10px;-webkit-overflow-scrolling:touch}
    .deck-row::-webkit-scrollbar{height:3px}
    .deck-row::-webkit-scrollbar-thumb{background:var(--pink);border-radius:3px}
    .dkbtn{flex-shrink:0;padding:8px 15px;border-radius:50px;border:2.5px solid #DDE5ED;background:white;font-family:'Fredoka',sans-serif;font-size:.9rem;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap}
    .dkbtn:hover:not(.on){border-color:var(--pink);color:var(--pink)}
    .dkbtn.on{background:var(--pink);color:white;border-color:var(--pink);box-shadow:0 4px 12px rgba(255,105,180,.4)}
    .diff-tabs{display:flex;gap:8px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
    .dtab{padding:8px 17px;border-radius:50px;border:2.5px solid #DDE5ED;background:white;font-family:'Fredoka',sans-serif;font-size:.88rem;font-weight:500;cursor:pointer;transition:all .2s}
    .dtab:hover:not(.on){border-color:var(--purple);color:var(--purple)}
    .dtab.on{background:var(--purple);color:white;border-color:var(--purple);box-shadow:0 4px 12px rgba(155,89,182,.4)}
    .deck-badge{text-align:center;font-family:'Fredoka',sans-serif;font-size:.88rem;color:var(--gray);margin-bottom:14px}
    .deck-badge span{color:var(--pink);font-weight:700}
    .stat-bar{display:flex;gap:12px;justify-content:center;align-items:center;margin-bottom:18px;flex-wrap:wrap}
    .stat-pill{display:inline-flex;align-items:center;gap:7px;padding:8px 15px;border-radius:50px;background:white;box-shadow:0 2px 10px rgba(0,0,0,.08);font-family:'Fredoka',sans-serif;font-size:.88rem;font-weight:500}
    .stat-pill .val{font-size:1.05rem;font-weight:700;color:var(--pink);min-width:32px;text-align:center;transition:color .3s}
    .grid-wrap{background:white;border-radius:24px;box-shadow:0 4px 28px rgba(0,0,0,.10);padding:20px}
    .grid{display:grid;gap:9px;justify-items:center}
    .card{width:84px;height:84px;perspective:600px;cursor:pointer}
    .card-inner{width:100%;height:100%;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.4,0,.2,1);border-radius:16px}
    .card.flipped .card-inner,.card.matched .card-inner{transform:rotateY(180deg)}
    .card-front,.card-back{position:absolute;inset:0;border-radius:16px;backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;align-items:center;justify-content:center}
    .card-back{background:linear-gradient(135deg,var(--purple),#7d3c98);box-shadow:0 4px 14px rgba(155,89,182,.3)}
    .card-back::after{content:'?';font-family:'Baloo 2',cursive;font-size:2rem;font-weight:800;color:rgba(255,255,255,.9)}
    .card-front{background:white;border:3px solid #EDE3F5;font-size:2.2rem;transform:rotateY(180deg);box-shadow:0 4px 14px rgba(0,0,0,.08)}
    .card.matched .card-front{background:linear-gradient(135deg,#f0fff4,#d4f7e1);border-color:var(--green)}
    .card.wrong .card-inner{animation:wobble .4s ease}
    @keyframes wobble{0%,100%{transform:rotateY(180deg)}30%{transform:rotateY(175deg) translateX(-4px)}70%{transform:rotateY(185deg) translateX(4px)}}
    .card:hover:not(.flipped):not(.matched) .card-back{filter:brightness(1.1)}
    .btn-row{display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap}
    .btn{padding:12px 20px;border-radius:50px;border:none;font-family:'Fredoka',sans-serif;font-size:.92rem;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:all .2s}
    .btn.primary{background:var(--pink);color:white;box-shadow:0 4px 12px rgba(255,105,180,.4)}
    .btn.primary:hover{background:#e05a9e;transform:translateY(-2px)}
    .btn.secondary{background:#f0f4f8;color:var(--charcoal)}
    .btn.secondary:hover{background:#e2e8ef}
    .btn.green{background:var(--green);color:white;box-shadow:0 4px 12px rgba(82,196,26,.3)}
    .btn.green:hover{background:var(--green-dk);transform:translateY(-2px)}
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:center;justify-content:center}
    .overlay.show{display:flex}
    .win-card{background:white;border-radius:28px;padding:36px 30px;text-align:center;max-width:400px;width:90%;box-shadow:0 16px 60px rgba(0,0,0,.2);animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
    @keyframes popIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
    .win-emoji{font-size:3.6rem;margin-bottom:10px;display:block}
    .win-title{font-family:'Baloo 2',cursive;font-size:1.8rem;font-weight:800;margin-bottom:7px}
    .win-msg{color:var(--gray);font-size:.93rem;font-weight:600;margin-bottom:18px}
    .stars{font-size:1.85rem;margin-bottom:18px;letter-spacing:4px}
    #confetti{position:fixed;inset:0;pointer-events:none;z-index:300}
    .cp{position:absolute;width:8px;height:8px;border-radius:2px;animation:fall linear forwards}
    @keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
    @media(max-width:600px){.card{width:68px;height:68px}.card-front{font-size:1.8rem}.grid{gap:7px}.grid-wrap{padding:14px}}
    @media(max-width:420px){.card{width:58px;height:58px}.card-front{font-size:1.55rem}}
  </style>
</head>
<body>
<nav class="navbar"><div class="nav-inner">
  <a class="nav-logo" href="index.html"><span class="logo-icon">🎓</span>Kivora<span>Learning</span></a>
  <a class="nav-back" href="index.html">← Home</a>
</div></nav>

<div class="page">
  <div class="hdr">
    <h1>🧠 <span>Memory</span> Game!</h1>
    <p>Flip cards &amp; find matching pairs — 10 themed decks, 100 card pairs total! 🃏</p>
  </div>

  <div class="section-lbl">Choose a Deck — 10 decks × 10 pairs = 100 card pairs</div>
  <div class="deck-row" id="deckRow">
    <button class="dkbtn on" onclick="setDeck(this,'farm')">🐄 Farm</button>
    <button class="dkbtn"    onclick="setDeck(this,'wild')">🦁 Wild</button>
    <button class="dkbtn"    onclick="setDeck(this,'ocean')">🐋 Ocean</button>
    <button class="dkbtn"    onclick="setDeck(this,'birds')">🦅 Birds</button>
    <button class="dkbtn"    onclick="setDeck(this,'fruits')">🍎 Fruits</button>
    <button class="dkbtn"    onclick="setDeck(this,'veggies')">🥕 Veggies</button>
    <button class="dkbtn"    onclick="setDeck(this,'space')">🚀 Space</button>
    <button class="dkbtn"    onclick="setDeck(this,'wheels')">🚗 Wheels</button>
    <button class="dkbtn"    onclick="setDeck(this,'sports')">⚽ Sports</button>
    <button class="dkbtn"    onclick="setDeck(this,'weather')">☀️ Weather</button>
  </div>

  <div class="diff-tabs">
    <button class="dtab on" onclick="setDiff(this,'easy')">🌟 Easy (4×3)</button>
    <button class="dtab"    onclick="setDiff(this,'medium')">🔥 Medium (4×4)</button>
    <button class="dtab"    onclick="setDiff(this,'hard')">💪 Hard (5×4)</button>
  </div>

  <div class="deck-badge">Deck: <span id="deckName">🐄 Farm</span> — 10 pairs available</div>

  <div class="stat-bar">
    <div class="stat-pill">🃏 Pairs  <span class="val" id="pairsFound">0</span></div>
    <div class="stat-pill">🔄 Flips  <span class="val" id="flipCount">0</span></div>
    <div class="stat-pill">⏱ Time   <span class="val" id="timer">0:00</span></div>
  </div>

  <div class="grid-wrap"><div class="grid" id="grid"></div></div>

  <div class="btn-row">
    <button class="btn primary"   onclick="restart()">🔀 New Game</button>
    <button class="btn secondary" onclick="peekAll()">👀 Peek</button>
    <button class="btn green"     onclick="nextDeck()">Next Deck ➡</button>
  </div>
</div>

<div class="overlay" id="winOverlay">
  <div class="win-card">
    <span class="win-emoji" id="winEmoji">🏆</span>
    <div class="win-title"  id="winTitle">Amazing!</div>
    <div class="stars"      id="winStars">⭐⭐⭐</div>
    <div class="win-msg"    id="winMsg">All pairs found!</div>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:4px">
      <button class="btn primary" onclick="closeWin();restart()">🔀 Replay</button>
      <button class="btn green"   onclick="closeWin();nextDeck()">Next Deck ➡</button>
    </div>
  </div>
</div>
<div id="confetti"></div>

<script>
const DECKS={
  farm:    {label:'🐄 Farm',    pairs:['🐄','🐖','🐑','🐓','🐴','🐐','🦆','🐕','🐈','🐇']},
  wild:    {label:'🦁 Wild',    pairs:['🦁','🐯','🐘','🦒','🦓','🦏','🦊','🐺','🐗','🦣']},
  ocean:   {label:'🐋 Ocean',   pairs:['🐋','🦈','🐬','🐙','🦑','🦞','🦀','🐠','🐡','🦭']},
  birds:   {label:'🦅 Birds',   pairs:['🦅','🦆','🦉','🦜','🦚','🦩','🐧','🦃','🦢','🕊️']},
  fruits:  {label:'🍎 Fruits',  pairs:['🍎','🍊','🍋','🍇','🍓','🍉','🍑','🍒','🥝','🫐']},
  veggies: {label:'🥕 Veggies', pairs:['🥕','🌽','🥦','🍆','🥑','🍅','🧅','🧄','🥔','🫑']},
  space:   {label:'🚀 Space',   pairs:['🚀','🛸','🌍','🌙','⭐','🪐','☄️','🔭','🛰️','🌟']},
  wheels:  {label:'🚗 Wheels',  pairs:['🚗','🚕','🚌','🚂','✈️','🚢','🚁','🏎️','🚲','🛵']},
  sports:  {label:'⚽ Sports',  pairs:['⚽','🏀','🏈','⚾','🎾','🏐','🏉','🥊','🏸','🏒']},
  weather: {label:'☀️ Weather', pairs:['☀️','🌤️','⛅','☁️','🌦️','🌧️','⛈️','❄️','🌈','🌊']},
};
const DECK_ORDER=['farm','wild','ocean','birds','fruits','veggies','space','wheels','sports','weather'];
const DIFFS={easy:{pairs:6,cols:4},medium:{pairs:8,cols:4},hard:{pairs:10,cols:5}};
let curDeck='farm',diff='easy',totalPairs=6;
let flipped=[],matched=0,flips=0,timerSec=0,timerInt=null,busy=false,started=false;

function setDeck(btn,d){document.querySelectorAll('.dkbtn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');curDeck=d;document.getElementById('deckName').textContent=DECKS[d].label;restart();}
function setDiff(btn,d){document.querySelectorAll('.dtab').forEach(t=>t.classList.remove('on'));btn.classList.add('on');diff=d;restart();}
function restart(){
  clearInterval(timerInt);timerSec=0;flips=0;matched=0;flipped=[];busy=false;started=false;updateStats();document.getElementById('timer').textContent='0:00';
  const{pairs,cols}=DIFFS[diff];totalPairs=pairs;
  const chosen=DECKS[curDeck].pairs.slice(0,pairs);
  const cards=shuffle([...chosen,...chosen]);
  const g=document.getElementById('grid');g.style.gridTemplateColumns=`repeat(${cols},1fr)`;g.innerHTML='';
  cards.forEach((e,i)=>g.appendChild(makeCard(e,i)));
}
function makeCard(emoji,idx){const c=document.createElement('div');c.className='card';c.dataset.emoji=emoji;c.dataset.idx=idx;c.innerHTML=`<div class="card-inner"><div class="card-back"></div><div class="card-front">${emoji}</div></div>`;c.addEventListener('click',()=>flipCard(c));return c;}
function flipCard(card){
  if(busy||card.classList.contains('flipped')||card.classList.contains('matched'))return;
  if(!started){started=true;startTimer();}
  card.classList.add('flipped');flips++;updateStats();
  if(flipped.length===0){flipped=[card];return;}
  const[first]=flipped;flipped=[];
  if(first.dataset.emoji===card.dataset.emoji){matched++;first.classList.add('matched');card.classList.add('matched');updateStats();if(matched===totalPairs)setTimeout(showWin,500);}
  else{busy=true;first.classList.add('wrong');card.classList.add('wrong');setTimeout(()=>{first.classList.remove('flipped','wrong');card.classList.remove('flipped','wrong');busy=false;},900);}
}
function peekAll(){if(busy)return;document.querySelectorAll('.card:not(.matched)').forEach(c=>c.classList.add('flipped'));setTimeout(()=>{document.querySelectorAll('.card:not(.matched)').forEach(c=>c.classList.remove('flipped'));},1500);}
function nextDeck(){const i=DECK_ORDER.indexOf(curDeck);const n=DECK_ORDER[(i+1)%DECK_ORDER.length];setDeck(document.querySelectorAll('.dkbtn')[DECK_ORDER.indexOf(n)],n);}
function showWin(){
  clearInterval(timerInt);const eff=flips/(totalPairs*2);
  const stars=eff<=1.3?'⭐⭐⭐':eff<=1.8?'⭐⭐':'⭐';
  const emoji=eff<=1.3?'🏆':eff<=1.8?'🌟':'💪';
  const title=eff<=1.3?'Perfect!':eff<=1.8?'Great Job!':'Well Done!';
  document.getElementById('winEmoji').textContent=emoji;document.getElementById('winTitle').textContent=title;
  document.getElementById('winStars').textContent=stars;document.getElementById('winMsg').textContent=`Finished in ${document.getElementById('timer').textContent} with ${flips} flips!`;
  document.getElementById('winOverlay').classList.add('show');launchConfetti();
}
function closeWin(){document.getElementById('winOverlay').classList.remove('show');}
function updateStats(){document.getElementById('pairsFound').textContent=matched+'/'+totalPairs;document.getElementById('flipCount').textContent=flips;document.getElementById('pairsFound').style.color=(matched===totalPairs&&totalPairs>0)?'var(--green)':'var(--pink)';}
function startTimer(){timerInt=setInterval(()=>{timerSec++;document.getElementById('timer').textContent=Math.floor(timerSec/60)+':'+(timerSec%60).toString().padStart(2,'0');},1000);}
function launchConfetti(){const w=document.getElementById('confetti'),cols=['#4A90E2','#FFD700','#FF8C42','#52C41A','#FF69B4','#9B59B6'];w.innerHTML='';for(let i=0;i<80;i++){const el=document.createElement('div');el.className='cp';el.style.cssText=`left:${Math.random()*100}%;top:-10px;background:${cols[i%cols.length]};border-radius:${Math.random()>.5?'50%':'2px'};width:${6+Math.random()*6}px;height:${6+Math.random()*6}px;animation-duration:${1.2+Math.random()*1.6}s;animation-delay:${Math.random()*0.8}s;`;w.appendChild(el);}setTimeout(()=>{w.innerHTML='';},3600);}
function shuffle(a){return a.sort(()=>Math.random()-.5);}
restart();
</script>
</body>
</html>
